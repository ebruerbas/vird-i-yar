<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Vird-i Yâr</title>
<meta name="theme-color" content="#f7f2e8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@500;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f2e8;
  --card:#fffdf8;
  --ink:#2f2a24;
  --muted:#776f64;
  --line:#e8dfd0;
  --accent:#9f7f4f;
  --accent-soft:#eee3cf;
  --shadow:0 10px 30px rgba(73,56,35,.08);
  --radius:22px;
}
body[data-theme="dark"]{
  --bg:#1f1c18;
  --card:#2a2621;
  --ink:#f6efe5;
  --muted:#bdb2a5;
  --line:#413a32;
  --accent:#c8a468;
  --accent-soft:#3c3327;
  --shadow:0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
html,body{touch-action:manipulation}
body{
  margin:0;
  background:
    radial-gradient(circle at top left, rgba(218,198,164,.22), transparent 36%),
    var(--bg);
  color:var(--ink);
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  transition:background .3s ease, color .3s ease;
}
button,input{font:inherit}
button{cursor:pointer}
.arabic,.arabic-big{
  font-family:"Scheherazade New", serif;
  direction:rtl;
}
.app{
  width:min(100%, 520px);
  margin:auto;
  min-height:100vh;
  padding:20px 18px 100px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}
.brand small{
  display:block;
  color:var(--muted);
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.brand h1{
  margin:3px 0 0;
  font-family:Georgia, "Times New Roman", serif;
  font-size:30px;
  font-weight:600;
}
.icon-btn{
  width:44px;height:44px;border-radius:50%;
  border:1px solid var(--line);
  background:var(--card);
  color:var(--ink);
}
.hero{
  background:linear-gradient(145deg, var(--card), var(--accent-soft));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  border-radius:28px;
  padding:24px;
  margin-bottom:18px;
}
.hero .eyebrow{color:var(--accent);font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.hero h2{
  margin:10px 0 8px;
  font-family:Georgia, "Times New Roman", serif;
  font-size:28px;
  line-height:1.25;
}
.hero p{margin:0;color:var(--muted);line-height:1.6}
.hero-actions{display:flex;gap:10px;margin-top:18px}
.primary,.secondary{
  border:none;border-radius:16px;padding:13px 16px;font-weight:700
}
.primary{background:var(--ink);color:var(--bg)}
.secondary{background:var(--accent-soft);color:var(--ink)}
.search-wrap{
  position:relative;margin:14px 0 18px;
}
.search-wrap input{
  width:100%;border:1px solid var(--line);background:var(--card);
  color:var(--ink);
  border-radius:18px;padding:15px 46px 15px 16px;outline:none;
  box-shadow:0 6px 18px rgba(73,56,35,.04);
}
.search-wrap span,.search-wrap button{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--muted);
  border:none;background:none;padding:0;font-size:16px;cursor:pointer;line-height:1
}
.grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px
}
.quick-card{
  border:1px solid var(--line);background:var(--card);border-radius:20px;
  color:var(--ink);
  padding:17px;text-align:left;box-shadow:0 7px 18px rgba(73,56,35,.04)
}
.quick-card strong{display:block;margin-top:10px;font-size:16px}
.quick-card small{color:var(--muted)}
.section-head{
  display:flex;justify-content:space-between;align-items:center;margin:22px 2px 12px
}
.section-head h3{margin:0;font-size:18px}
.section-head span{color:var(--muted);font-size:13px}
.section-head button{border:none;background:none;color:var(--accent);font-weight:700}
.list{display:grid;gap:12px}
.item{
  border:1px solid var(--line);background:var(--card);border-radius:20px;
  padding:16px;box-shadow:0 6px 16px rgba(73,56,35,.04);
}
.item-top{display:flex;justify-content:space-between;gap:12px}
.item h4{margin:0 0 5px;font-size:17px}
.item p{margin:0;color:var(--muted);line-height:1.55;font-size:14px}
.item .arabic{
  font-size:26px;color:var(--accent);margin-bottom:6px;text-align:right
}
.item .num{
  font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.06em
}
.tag{
  display:inline-block;background:var(--accent-soft);color:var(--accent);
  border-radius:999px;padding:5px 9px;font-size:11px;font-weight:700;margin-top:10px
}
.fav{
  border:none;background:transparent;font-size:20px;color:#b1a99e
}
.fav.active{color:#a56b55}
.bottom-nav{
  position:fixed;left:50%;bottom:0;
  transform:translate3d(-50%,0,0);
  -webkit-transform:translate3d(-50%,0,0);
  will-change:transform;
  width:min(100%,520px);background:var(--card);
  backdrop-filter:blur(14px);border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(5,1fr);
  padding:9px 8px calc(9px + env(safe-area-inset-bottom));
  z-index:20;
}
.nav-btn{
  border:none;background:none;color:var(--muted);padding:7px 2px;
  font-size:11px
}
.nav-btn span{display:block;font-size:20px;margin-bottom:3px}
.nav-btn.active{color:var(--ink);font-weight:800}
.view{display:none}
.view.active{display:block}
.modal{
  position:fixed;inset:0;background:rgba(30,25,20,.45);display:none;
  align-items:flex-end;justify-content:center;z-index:40
}
.modal.open{display:flex}
.sheet{
  position:relative;
  width:min(100%,520px);max-height:88vh;overflow:auto;background:var(--bg);
  border-radius:28px 28px 0 0;padding:24px 20px 32px;
}
.sheet-close{
  position:absolute;top:14px;right:14px;
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--line);background:var(--card);color:var(--ink);
  font-size:16px;display:flex;align-items:center;justify-content:center;z-index:5
}
.sheet-bar{width:48px;height:5px;background:var(--line);border-radius:999px;margin:0 auto 18px}
.lang-toggle{display:flex;justify-content:center;gap:8px;margin-bottom:12px}
.lang-btn{
  border:1px solid var(--line);background:var(--card);color:var(--muted);
  padding:7px 16px;border-radius:999px;font-size:13px;font-weight:700
}
.lang-btn.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.sheet h2{font-family:Georgia,serif;margin:0 0 8px}
.sheet .arabic-big{font-size:34px;text-align:right;color:var(--accent);line-height:1.9}
.meta{
  padding:13px;border-radius:16px;background:var(--card);border:1px solid var(--line);margin:12px 0
}
.counter{
  text-align:center;background:var(--card);border:1px solid var(--line);
  border-radius:24px;padding:20px;margin-top:16px
}
.count-number{font-size:54px;font-weight:800;margin:8px 0;font-variant-numeric:tabular-nums}
.count-btn{
  width:120px;height:120px;border-radius:50%;border:none;background:var(--ink);
  color:var(--bg);font-size:18px;font-weight:800;box-shadow:0 12px 25px rgba(47,42,36,.22)
}
.counter-actions{display:flex;justify-content:center;gap:10px;margin-top:14px}
.counter-actions button{border:none;background:var(--accent-soft);color:var(--ink);padding:10px 14px;border-radius:12px}
.stage-info{
  display:flex;justify-content:center;gap:8px;margin-bottom:6px;flex-wrap:wrap
}
.stage-dot{
  width:10px;height:10px;border-radius:50%;background:var(--line)
}
.stage-dot.done{background:var(--accent)}
.stage-dot.current{background:var(--ink)}
.stage-label{font-weight:700;color:var(--accent);margin:4px 0 0}
.tur-badge{color:var(--muted);font-size:13px;margin-top:8px}
.empty{
  color:var(--muted);text-align:center;padding:30px 20px;border:1px dashed var(--line);border-radius:20px
}
.toast{
  position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:14px;
  font-weight:600;font-size:14px;opacity:0;pointer-events:none;
  transition:all .3s ease;z-index:60;white-space:nowrap
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.virtues{margin:12px 0;padding:0;list-style:none;display:grid;gap:9px}
.virtues li{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 12px;line-height:1.55;color:var(--muted)}
.virtues li::before{content:"•";color:var(--accent);font-weight:800;margin-right:8px}
.source-list{display:grid;gap:8px;margin-top:10px}
.source-item{font-size:13px;color:var(--muted);padding:9px 10px;border-left:3px solid var(--accent);background:var(--card);border-radius:8px}
.reading{font-size:14px;color:var(--muted);line-height:1.65}
.disclaimer{font-size:12px;color:var(--muted);line-height:1.55;margin-top:10px}
.arabic-toggle{width:100%;margin:4px 0 8px}
@media (max-width:380px){
  .hero h2{font-size:24px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <small>Esma • Ayet • Dua</small>
      <h1>Vird-i Yâr</h1>
    </div>
    <button class="icon-btn" id="themeBtn" aria-label="Tema">☾</button>
  </header>

  <main>
    <section id="home" class="view active">
      <div class="hero">
        <div class="eyebrow">Bugünün Esması</div>
        <h2 id="heroTitle"></h2>
        <p id="heroDesc"></p>
        <div class="hero-actions">
          <button class="primary" id="heroOpenBtn">İncele</button>
          <button class="secondary" id="heroCountBtn">Zikre Başla</button>
        </div>
      </div>

      <div class="search-wrap">
        <input id="globalSearch" type="search" enterkeyhint="search" placeholder="Esma, ayet, dua veya konu ara... (Enter'a bas)" />
        <button type="button" id="searchIconBtn" aria-label="Ara">⌕</button>
      </div>

      <div class="grid">
        <button class="quick-card" onclick="switchView('esma')"><span>📿</span><strong>Esmaül Hüsna</strong><small>99 güzel isim</small></button>
        <button class="quick-card" onclick="switchView('ayet')"><span>📖</span><strong>Ayetler</strong><small>Konulara göre seçmeler</small></button>
        <button class="quick-card" onclick="switchView('dua')"><span>🤲</span><strong>Dualar</strong><small>Günlük ve Kur'an duaları</small></button>
        <button class="quick-card" onclick="switchView('favori')"><span>♡</span><strong>Favorilerim</strong><small>Kendi seçtiklerin</small></button>
      </div>

      <div class="section-head"><h3>Tesbihat &amp; Günlük Zikirler</h3><span id="tesbihCount"></span></div>
      <div id="tesbihList" class="list"></div>
    </section>

    <section id="esma" class="view">
      <div class="section-head"><h3>Esmaül Hüsna</h3><span id="esmaCount"></span></div>
      <div id="esmaList" class="list"></div>
    </section>

    <section id="ayet" class="view">
      <div class="section-head"><h3>Ayetler</h3><span>Seçkiler</span></div>
      <div id="ayetList" class="list"></div>
    </section>

    <section id="dua" class="view">
      <div class="section-head"><h3>Dualar</h3><span>Günlük</span></div>
      <div id="duaList" class="list"></div>
    </section>

    <section id="favori" class="view">
      <div class="section-head"><h3>Favorilerim</h3><span id="favCount">0 içerik</span></div>
      <div id="favList" class="list"></div>
    </section>

    <section id="search" class="view">
      <div class="section-head"><h3>Arama Sonuçları</h3><span id="searchCount"></span></div>
      <div id="searchList" class="list"></div>
    </section>
  </main>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" data-view="home"><span>⌂</span>Ana Sayfa</button>
  <button class="nav-btn" data-view="esma"><span>◌</span>Esmalar</button>
  <button class="nav-btn" data-view="ayet"><span>◫</span>Ayetler</button>
  <button class="nav-btn" data-view="dua"><span>♧</span>Dualar</button>
  <button class="nav-btn" data-view="favori"><span>♡</span>Favoriler</button>
</nav>

<div id="modal" class="modal" onclick="closeModal(event)">
  <div class="sheet">
    <button type="button" class="sheet-close" aria-label="Kapat" onclick="event.stopPropagation(); $('modal').classList.remove('open');">✕</button>
    <div class="sheet-bar"></div>
    <div id="sheetContent"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ============================================================
// VERİ — ESMÂ-İ HÜSNÂ (99 isim, klasik Tirmizî listesi sırasıyla)
// Ebced değerleri Arapça yazılıştan standart ebced hesabıyla
// üretilmiştir (şedde sayılmaz, baştaki harf-i tarif hesaba
// katılmaz; "Allah" lafzı istisnadır).
// ============================================================
const data = [
  { id:'esma-1', type:'esma', title:'Allah', arabic:'الله', subtitle:'Bütün isimlerin sahibi olan zât ismi.', meaning:'Varlığı zorunlu olan, ibadete lâyık tek mabud; bütün kemâl sıfatları kendinde toplayan zât isminin özel adı.', ebced:66, tag:'Zât İsmi',
    virtues:['Lafza-i celâl, diğer bütün esmânın kendisine nispet edildiği ana isimdir; hiçbir varlığa bu isim verilmemiştir.','Zikri, kulu isimlerin ve sıfatların ötesinde doğrudan Rabbine yöneltir.'],
    verses:['Bakara 2/255','İhlâs 112/1'] },
  { id:'esma-2', type:'esma', title:'Er-Rahmân', arabic:'الرحمن', subtitle:'Rahmeti bütün varlığı kuşatan.', meaning:'Rahmeti sınırsız ve kuşatıcı olan; mümin-kâfir ayırmadan bütün yaratılmışlara hayat, nimet ve imkân bahşeden.', ebced:298, tag:'Rahmet',
    virtues:['Bu isim, Allah’ın rahmetinin varlığın tamamını kuşattığını tefekkür etmeye çağırır.','Zikri, merhameti yalnız beklenen bir nimet değil, başkalarına taşınması gereken bir ahlâk olarak hatırlatır.'],
    verses:['Fâtiha 1/3','Rahmân 55/1'] },
  { id:'esma-3', type:'esma', title:'Er-Rahîm', arabic:'الرحيم', subtitle:'Çok merhamet eden.', meaning:'Rahmetini özellikle iman edip sâlih amel işleyenlere âhirette eksiksiz ulaştıracak olan.', ebced:258, tag:'Rahmet',
    virtues:['Rahmân genel rahmeti, Rahîm ise özel ve süreklilik taşıyan merhameti ifade eder.','Zikri, ümidi diri tutar; kulun hatalarına rağmen rahmet kapısının açık olduğunu hatırlatır.'],
    verses:['Fâtiha 1/3','Ahzâb 33/43'] },
  { id:'esma-4', type:'esma', title:'El-Melik', arabic:'الملك', subtitle:'Mülkün gerçek sahibi.', meaning:'Görünen ve görünmeyen bütün âlemlerin gerçek hükümdarı; mülkünde dilediği gibi tasarruf eden.', ebced:90, tag:'Hükümranlık',
    virtues:['Bu isim, dünyadaki bütün sahipliklerin geçici ve emanet olduğunu öğretir.','Zikri, kula makam ve mülk karşısında tevazuyu, kayıplar karşısında ise sükûneti kazandırır.'],
    verses:['Haşr 59/23','Tâhâ 20/114'] },
  { id:'esma-5', type:'esma', title:'El-Kuddûs', arabic:'القدوس', subtitle:'Her eksiklikten münezzeh.', meaning:'Her türlü kusur, eksiklik ve yaratılmışlık özelliğinden uzak olan; tertemiz ve mukaddes olan.', ebced:170, tag:'Kudsiyet',
    virtues:['Bu isim, Allah tasavvurunu her türlü noksan düşünceden arındırmayı öğretir.','Zikri, kalbi ve niyeti kirlerden temizleme çabasına eşlik eder.'],
    verses:['Haşr 59/23','Cum‘a 62/1'] },
  { id:'esma-6', type:'esma', title:'Es-Selâm', arabic:'السلام', subtitle:'Esenliğin kaynağı olan.', meaning:'Her türlü eksiklikten uzak olan; kullarına güven, selâmet ve esenlik veren.', ebced:131, tag:'Esenlik',
    virtues:['Bu isim, gerçek güven ve esenliğin Allah’tan geldiğini hatırlatır.','Zikri, kişiyi çevresine güven ve barış taşıyan biri olmaya yöneltir.'],
    verses:['Haşr 59/23'] },
  { id:'esma-7', type:'esma', title:'El-Mü’min', arabic:'المؤمن', subtitle:'Güven veren, vaadine güvenilen.', meaning:'Kullarına güven veren, iman nasip eden, vaadinden dönmeyen; korkulardan emin kılan.', ebced:136, tag:'Güven',
    virtues:['Bu isim, iman ile iç güvenlik duygusu arasındaki derin bağı gösterir.','Zikri, kaygı zamanlarında kalbin Allah’ın vaadine yaslanmasına yardım eder.'],
    verses:['Haşr 59/23'] },
  { id:'esma-8', type:'esma', title:'El-Müheymin', arabic:'المهيمن', subtitle:'Gözetip koruyan.', meaning:'Bütün varlığı görüp gözeten, koruyan ve her şeye şahit olan.', ebced:145, tag:'Koruma',
    virtues:['Bu isim, hiçbir anın ve hiçbir hâlin ilâhî gözetimin dışında kalmadığını öğretir.','Zikri, yalnızlık duygusuna karşı “görülüyor ve gözetiliyorum” bilincini yerleştirir.'],
    verses:['Haşr 59/23'] },
  { id:'esma-9', type:'esma', title:'El-Azîz', arabic:'العزيز', subtitle:'Mutlak izzet ve galibiyet sahibi.', meaning:'Mağlup edilmesi mümkün olmayan, mutlak güç ve izzet sahibi olan.', ebced:94, tag:'İzzet',
    virtues:['Bu isim, gerçek üstünlüğün güç gösterisinde değil Allah’a nispette olduğunu öğretir.','Zikri, kula haksızlık karşısında dik duruş, zafer anında ise alçakgönüllülük kazandırır.'],
    verses:['Haşr 59/23','Yâsîn 36/38'] },
  { id:'esma-10', type:'esma', title:'El-Cebbâr', arabic:'الجبار', subtitle:'İradesini hükmeden, eksikleri onaran.', meaning:'Dilediğini yaptırmaya gücü yeten; kırılanı onaran, eksikleri tamamlayan.', ebced:206, tag:'Kudret',
    virtues:['Cebbâr ismi, kırık kalpleri onaran (cebr eden) anlamıyla da şerh edilmiştir.','Zikri, kayıp ve kırgınlık dönemlerinde onarılma ümidini besler.'],
    verses:['Haşr 59/23'] },
  { id:'esma-11', type:'esma', title:'El-Mütekebbir', arabic:'المتكبر', subtitle:'Büyüklük yalnız kendisine ait olan.', meaning:'Azamet ve büyüklüğün yegâne sahibi; yaratılmışlara ait eksikliklerden yüce olan.', ebced:662, tag:'Azamet',
    virtues:['Büyüklenme yalnız Allah’ın hakkıdır; kul için aynı vasıf kınanmıştır.','Zikri, kibri fark edip ondan arınmaya vesile olur.'],
    verses:['Haşr 59/23'] },
  { id:'esma-12', type:'esma', title:'El-Hâlık', arabic:'الخالق', subtitle:'Her şeyi yaratan.', meaning:'Her şeyi yoktan var eden, her varlığın ölçüsünü ve kaderini belirleyen.', ebced:731, tag:'Yaratma',
    virtues:['Bu isim, varlıktaki her ayrıntının bilinçli bir yaratmanın eseri olduğunu hatırlatır.','Zikri, tabiata ve insana bakışta hayret ve şükür duygusunu tazeler.'],
    verses:['Haşr 59/24','En‘âm 6/102'] },
  { id:'esma-13', type:'esma', title:'El-Bâri’', arabic:'البارئ', subtitle:'Örneksiz ve kusursuz var eden.', meaning:'Yarattıklarını örneksiz, uyumlu ve kusursuz biçimde var eden.', ebced:213, tag:'Yaratma',
    virtues:['Bâri’ ismi, yaratmadaki uyum ve düzeni öne çıkarır.','Zikri, kâinattaki âhengi fark ederek yaratıcıya hayranlığı derinleştirir.'],
    verses:['Haşr 59/24','Bakara 2/54'] },
  { id:'esma-14', type:'esma', title:'El-Musavvir', arabic:'المصور', subtitle:'Her varlığa suretini veren.', meaning:'Her varlığa kendine özgü şekil, suret ve özellik veren.', ebced:336, tag:'Yaratma',
    virtues:['Bu isim, her insanın ve her varlığın biricikliğini ilâhî bir tasarım olarak görmeyi öğretir.','Zikri, kendi sureti ve yaratılışı hakkında şükür bilinci kazandırır.'],
    verses:['Haşr 59/24'] },
  { id:'esma-15', type:'esma', title:'El-Gaffâr', arabic:'الغفار', subtitle:'Tekrar tekrar bağışlayan.', meaning:'Günahları ne kadar çok olursa olsun tekrar tekrar örten ve bağışlayan.', ebced:1281, tag:'Mağfiret',
    virtues:['Bu isim, tövbe kapısının hiçbir zaman kapanmadığını öğretir.','Zikri, hatadan sonra ümitsizliğe değil yeniden başlamaya çağırır.'],
    verses:['Nûh 71/10','Zümer 39/5'] },
  { id:'esma-16', type:'esma', title:'El-Kahhâr', arabic:'القهار', subtitle:'Her şeye galip gelen.', meaning:'Bütün varlığı kudretiyle kuşatan, karşı konulamayan mutlak galip.', ebced:306, tag:'Kudret',
    virtues:['Bu isim, hiçbir zulmün ve gücün ilâhî kudret karşısında kalıcı olmadığını hatırlatır.','Zikri, mazluma teselli, güç sahibine ise sorumluluk bilinci verir.'],
    verses:['Ra‘d 13/16','Zümer 39/4'] },
  { id:'esma-17', type:'esma', title:'El-Vehhâb', arabic:'الوهاب', subtitle:'Karşılıksız bolca veren.', meaning:'Hiçbir karşılık beklemeden, dilediğine dilediği kadar bağışlayan.', ebced:14, tag:'Lütuf',
    virtues:['Bu isim, nimetlerin hak edişten önce ilâhî cömertlikten geldiğini öğretir.','Zikri, kulu da karşılıksız vermeye ve paylaşmaya teşvik eder.'],
    verses:['Âl-i İmrân 3/8','Sâd 38/9'] },
  { id:'esma-18', type:'esma', title:'Er-Rezzâk', arabic:'الرزاق', subtitle:'Bütün rızıkları veren.', meaning:'Her canlının maddî ve mânevî rızkını yaratan, ulaştıran ve sürdüren.', ebced:308, tag:'Rızık',
    virtues:['Rızık yalnız para değil; sağlık, bilgi, huzur ve dostluk da ilâhî rızıktır.','Zikri, helâl kazanç için çabalarken sonucu Allah’tan bilmeyi öğretir.'],
    verses:['Zâriyât 51/58'] },
  { id:'esma-19', type:'esma', title:'El-Fettâh', arabic:'الفتاح', subtitle:'Kapıları ve yolları açan.', meaning:'Kapalı kapıları, düğümlenmiş işleri ve anlaşmazlıkları hayırla açan; adaletle hükmeden.', ebced:489, tag:'Fütuhat',
    virtues:['Bu isim, çıkışsız görünen durumlarda açılış ümidini temsil eder.','Zikri, tıkanan işler ve kararsızlık anlarında Allah’a yönelmeyi hatırlatır.'],
    verses:['Sebe’ 34/26'] },
  { id:'esma-20', type:'esma', title:'El-Alîm', arabic:'العليم', subtitle:'Her şeyi hakkıyla bilen.', meaning:'Olmuş ve olacak her şeyi, gizli ve açık her hâli eksiksiz bilen.', ebced:150, tag:'İlim',
    virtues:['Bu isim, hiçbir niyetin ve emeğin bilinmeden kalmadığını öğretir.','Zikri, bilgiye saygıyı ve öğrenme çabasını ibadet bilinciyle birleştirir.'],
    verses:['Bakara 2/32','Yâsîn 36/81'] },
  { id:'esma-21', type:'esma', title:'El-Kâbıd', arabic:'القابض', subtitle:'Daraltan, tutan.', meaning:'Hikmetiyle rızkı ve imkânları daraltan; ruhları kabzeden.', ebced:903, tag:'Takdir',
    virtues:['Darlık dönemleri de ilâhî hikmetin bir parçasıdır; Kâbıd ismi bunu hatırlatır.','Zikri, daralma zamanlarında isyana değil sabra ve tefekküre yöneltir.'],
    verses:['Bakara 2/245 (fiil olarak)'] },
  { id:'esma-22', type:'esma', title:'El-Bâsıt', arabic:'الباسط', subtitle:'Genişleten, açan.', meaning:'Rızkı, ömrü, gönlü ve imkânları hikmetiyle genişleten.', ebced:72, tag:'Takdir',
    virtues:['Kâbıd ile birlikte anılır; darlık ve genişlik aynı hikmetin iki yüzüdür.','Zikri, bolluk zamanlarında şımarmadan şükretmeyi öğretir.'],
    verses:['Bakara 2/245 (fiil olarak)'] },
  { id:'esma-23', type:'esma', title:'El-Hâfıd', arabic:'الخافض', subtitle:'Alçaltan.', meaning:'Zalimleri ve büyüklenenleri hikmetiyle alçaltan.', ebced:1481, tag:'Takdir',
    virtues:['Bu isim, dünyevî yükselişlerin mutlak olmadığını, ölçünün ilâhî adalette saklı olduğunu öğretir.','Zikri, kibir ve zulümden sakınma bilincini güçlendirir.'],
    verses:[] },
  { id:'esma-24', type:'esma', title:'Er-Râfi’', arabic:'الرافع', subtitle:'Yükselten.', meaning:'Dilediğini şeref, derece ve itibar bakımından yükselten.', ebced:351, tag:'Takdir',
    virtues:['Gerçek yükseliş, Allah katındaki derecenin yükselmesidir.','Zikri, itibar kaybı korkusunu ilâhî takdire güvenle dengelemeyi öğretir.'],
    verses:['Âl-i İmrân 3/55 (fiil olarak)'] },
  { id:'esma-25', type:'esma', title:'El-Muizz', arabic:'المعز', subtitle:'İzzet ve şeref veren.', meaning:'Dilediğine izzet, şeref ve itibar veren.', ebced:117, tag:'İzzet',
    virtues:['İzzetin kaynağı mal ya da makam değil, Allah’ın lütfudur.','Zikri, onuru insanlardan değil Rabbinden bilmeyi öğretir.'],
    verses:['Âl-i İmrân 3/26 (fiil olarak)'] },
  { id:'esma-26', type:'esma', title:'El-Müzill', arabic:'المذل', subtitle:'Zillete düşüren.', meaning:'Hak edeni hikmetiyle zillete düşüren, gururu kıran.', ebced:770, tag:'Takdir',
    virtues:['Bu isim, zorbalığın ve haksız üstünlüğün sonunun ilâhî adalete çıktığını hatırlatır.','Zikri, kimseyi küçümsememe ve haddi aşmama bilincini besler.'],
    verses:['Âl-i İmrân 3/26 (fiil olarak)'] },
  { id:'esma-27', type:'esma', title:'Es-Semî’', arabic:'السميع', subtitle:'Her şeyi işiten.', meaning:'Gizli açık her sesi, her duayı ve her yakarışı işiten.', ebced:180, tag:'İşitme',
    virtues:['Hiçbir dua karşılıksız bir boşluğa söylenmiş değildir; Semî’ ismi bunun güvencesidir.','Zikri, duaya devamı ve içten yakarışı teşvik eder.'],
    verses:['Bakara 2/127','Şûrâ 42/11'] },
  { id:'esma-28', type:'esma', title:'El-Basîr', arabic:'البصير', subtitle:'Her şeyi gören.', meaning:'Gizli açık her şeyi, her ameli ve her hâli gören.', ebced:302, tag:'Görme',
    virtues:['Bu isim, yalnızken de görünürken de aynı dürüstlükte olmayı (ihsan bilincini) öğretir.','Zikri, davranışlarda iç-dış tutarlılığını güçlendirir.'],
    verses:['İsrâ 17/1','Şûrâ 42/11'] },
  { id:'esma-29', type:'esma', title:'El-Hakem', arabic:'الحكم', subtitle:'Son hükmü veren.', meaning:'Hükmünde hikmetli olan, son ve kesin hükmü verecek olan.', ebced:68, tag:'Hüküm',
    virtues:['Nihaî hüküm insanların değil Allah’ındır; bu isim mahkeme-i kübrâyı hatırlatır.','Zikri, insanlar hakkında acele hüküm vermekten sakındırır.'],
    verses:['En‘âm 6/114 (fiil kalıbıyla)'] },
  { id:'esma-30', type:'esma', title:'El-Adl', arabic:'العدل', subtitle:'Mutlak adalet sahibi.', meaning:'Bizzat adaletin kaynağı olan; hiç kimseye zerre kadar haksızlık etmeyen.', ebced:104, tag:'Adalet',
    virtues:['Bu isim, dünyadaki eksik kalan adaletlerin âhirette tamamlanacağını öğretir.','Zikri, kulun kendi ölçüsünde âdil olma sorumluluğunu hatırlatır.'],
    verses:[] },
  { id:'esma-31', type:'esma', title:'El-Latîf', arabic:'اللطيف', subtitle:'Lütfu en ince yollarla ulaştıran.', meaning:'Kullarının en gizli hâllerini bilen; yardımını çoğu zaman fark edilmeyen ince yollarla ulaştıran.', ebced:129, tag:'Lütuf',
    virtues:['Bu isim, görünür sebeplerin ötesindeki ilâhî inceliğe güvenmeyi öğretir.','Zikri, kulun kendi davranışlarında da incelikli ve zarif olmasını hatırlatır.'],
    verses:['En‘âm 6/103','Mülk 67/14'] },
  { id:'esma-32', type:'esma', title:'El-Habîr', arabic:'الخبير', subtitle:'Her şeyden haberdar.', meaning:'Her şeyin iç yüzünden, gizli ve açık bütün hâllerden haberdar olan.', ebced:812, tag:'İlim',
    virtues:['Hiçbir olay ilâhî bilginin dışında gerçekleşmez; görünmeyen ayrıntılar da bilinir.','Zikri, gizli niyetlerin de bilindiği şuurunu diri tutar.'],
    verses:['Mülk 67/14','En‘âm 6/18'] },
  { id:'esma-33', type:'esma', title:'El-Halîm', arabic:'الحليم', subtitle:'Cezada acele etmeyen.', meaning:'Kullarının hatalarına rağmen cezalandırmada acele etmeyen, mühlet veren.', ebced:88, tag:'Hilm',
    virtues:['Bu isim, ilâhî sabrın günahkâra tanınmış bir fırsat olduğunu öğretir.','Zikri, öfke anında yumuşaklığı ve teenniyi hatırlatır.'],
    verses:['Bakara 2/225','İsrâ 17/44'] },
  { id:'esma-34', type:'esma', title:'El-Azîm', arabic:'العظيم', subtitle:'Azameti sınırsız olan.', meaning:'Büyüklüğü akılların kavrayamayacağı kadar yüce olan.', ebced:1020, tag:'Azamet',
    virtues:['“Sübhâne rabbiye’l-azîm” zikriyle rükûda anılan isimdir.','Zikri, insanın kendi küçüklüğünü fark edip huzur bulmasına vesile olur.'],
    verses:['Bakara 2/255','Vâkıa 56/96'] },
  { id:'esma-35', type:'esma', title:'El-Gafûr', arabic:'الغفور', subtitle:'Günahları örten.', meaning:'Günahları örten, kusurları bağışlayan; mağfireti bol olan.', ebced:1286, tag:'Mağfiret',
    virtues:['Bu isim, hiçbir günahın ilâhî mağfiretten büyük olmadığını öğretir (Zümer 39/53).','Zikri, kulun başkalarının kusurlarını da örtmesine örneklik eder.'],
    verses:['Zümer 39/53','Bürûc 85/14'] },
  { id:'esma-36', type:'esma', title:'Eş-Şekûr', arabic:'الشكور', subtitle:'Az amele çok karşılık veren.', meaning:'Kulun az amelini bile kat kat karşılıkla ödüllendiren.', ebced:526, tag:'Şükür',
    virtues:['Bu isim, hiçbir iyiliğin küçümsenmemesi gerektiğini öğretir.','Zikri, nankörlüğe karşı şükür ahlâkını yerleştirir.'],
    verses:['Fâtır 35/30','Şûrâ 42/23'] },
  { id:'esma-37', type:'esma', title:'El-Aliyy', arabic:'العلي', subtitle:'Yüceler yücesi.', meaning:'Şanı, zâtı ve sıfatları bakımından en yüce olan.', ebced:110, tag:'Yücelik',
    virtues:['“Sübhâne rabbiye’l-a‘lâ” zikriyle secdede anılan yücelik bu ismin ufkudur.','Zikri, kulun himmetini ve hedeflerini yükseltir.'],
    verses:['Bakara 2/255','Şûrâ 42/4'] },
  { id:'esma-38', type:'esma', title:'El-Kebîr', arabic:'الكبير', subtitle:'En büyük.', meaning:'Zâtında ve sıfatlarında büyüklüğün gerçek sahibi olan.', ebced:232, tag:'Azamet',
    virtues:['Tekbir (Allahu ekber) bu ismin günlük hayattaki en yaygın zikridir.','Zikri, dünyevî meseleleri gerçek boyutuna küçültüp kalbi ferahlatır.'],
    verses:['Ra‘d 13/9','Sebe’ 34/23'] },
  { id:'esma-39', type:'esma', title:'El-Hafîz', arabic:'الحفيظ', subtitle:'Koruyup gözeten.', meaning:'Her şeyi koruyan, kaydeden ve dengede tutan.', ebced:998, tag:'Koruma',
    virtues:['Bu isim, amellerin kaybolmadığını ve varlığın korunarak ayakta durduğunu öğretir.','Zikri, emanete riayet ve koruma sorumluluğunu hatırlatır.'],
    verses:['Hûd 11/57','Sebe’ 34/21'] },
  { id:'esma-40', type:'esma', title:'El-Mukît', arabic:'المقيت', subtitle:'Azığı yaratan ve ulaştıran.', meaning:'Her canlının gıdasını ve güç kaynağını yaratıp ulaştıran; her şeye gücü yeten.', ebced:550, tag:'Rızık',
    virtues:['Bu isim, bedenin gıdası gibi ruhun gıdasının da Allah’tan geldiğini öğretir.','Zikri, nimeti israf etmeden ve paylaşarak kullanma bilincini besler.'],
    verses:['Nisâ 4/85'] },
  { id:'esma-41', type:'esma', title:'El-Hasîb', arabic:'الحسيب', subtitle:'Hesabı gören, kâfi gelen.', meaning:'Kullarının hesabını en ince ayrıntısıyla gören; kendisine güvenene yeten.', ebced:80, tag:'Hesap',
    virtues:['“Hasbünallâhu ve ni‘me’l-vekîl” duası bu ismin gölgesinde söylenir.','Zikri, hem hesap bilincini hem de Allah’ın kula yeteceği güvenini birlikte verir.'],
    verses:['Nisâ 4/6','Ahzâb 33/39'] },
  { id:'esma-42', type:'esma', title:'El-Celîl', arabic:'الجليل', subtitle:'Celâl ve ululuk sahibi.', meaning:'Büyüklük, heybet ve ululuk sıfatlarının sahibi olan.', ebced:73, tag:'Celâl',
    virtues:['Celâl, cemâl ile birlikte ilâhî azametin iki yüzünü oluşturur.','Zikri, saygı ve hayret duygusunu ibadete taşır.'],
    verses:['Rahmân 55/27 (zü’l-celâl)'] },
  { id:'esma-43', type:'esma', title:'El-Kerîm', arabic:'الكريم', subtitle:'Cömertliğin kaynağı.', meaning:'Lütfu ve ikramı bol olan; istemeden de veren, verdikçe artıran.', ebced:270, tag:'Cömertlik',
    virtues:['Bu isim, ikramın karşılık beklemeden yapılanının en değerli olduğunu öğretir.','Zikri, eli açıklığı ve gönül zenginliğini besler.'],
    verses:['İnfitâr 82/6','Neml 27/40'] },
  { id:'esma-44', type:'esma', title:'Er-Rakîb', arabic:'الرقيب', subtitle:'Her an gözeten.', meaning:'Bütün varlığı her an görüp gözeten, hiçbir şeyi kaçırmayan.', ebced:312, tag:'Gözetim',
    virtues:['Bu isim, murakabe (kendini Allah’ın gözetiminde bilme) ahlâkının temelidir.','Zikri, yalnızken de sorumlu davranma bilincini güçlendirir.'],
    verses:['Nisâ 4/1','Ahzâb 33/52'] },
  { id:'esma-45', type:'esma', title:'El-Mücîb', arabic:'المجيب', subtitle:'Dualara karşılık veren.', meaning:'Kendisine yönelen kulların dualarına karşılık veren.', ebced:55, tag:'İcabet',
    virtues:['“Bana dua edin, size karşılık vereyim” (Mü’min 40/60) vaadinin ismidir.','Zikri, duanın asla boşa gitmediği güvenini tazeler.'],
    verses:['Hûd 11/61'] },
  { id:'esma-46', type:'esma', title:'El-Vâsi’', arabic:'الواسع', subtitle:'İlmi ve rahmeti geniş olan.', meaning:'İlmi, rahmeti, kudreti ve bağışı her şeyi kuşatacak kadar geniş olan.', ebced:137, tag:'Genişlik',
    virtues:['Bu isim, ilâhî imkânların insan hesaplarıyla sınırlanamayacağını öğretir.','Zikri, darlık hissini genişlik ümidine çevirir.'],
    verses:['Bakara 2/115','Bakara 2/247'] },
  { id:'esma-47', type:'esma', title:'El-Hakîm', arabic:'الحكيم', subtitle:'Her işi hikmetli olan.', meaning:'Her emri, her yaratması ve her takdiri yerli yerinde olan.', ebced:78, tag:'Hikmet',
    virtues:['Bu isim, anlaşılmayan olayların da bir hikmet taşıdığını öğretir.','Zikri, “neden?” sorusunun sancısını “bir hikmeti var” teslimiyetiyle yumuşatır.'],
    verses:['Bakara 2/32','Lokmân 31/27'] },
  { id:'esma-48', type:'esma', title:'El-Vedûd', arabic:'الودود', subtitle:'Çok seven ve sevilen.', meaning:'Sâlih kullarını seven, onlara sevgisini hissettiren ve gönüllerde sevgi yaratan.', ebced:20, tag:'Sevgi',
    virtues:['Bu isim, Allah-kul ilişkisinin korku kadar sevgi üzerine de kurulduğunu gösterir.','Zikri, ibadete muhabbet boyutu katar ve kalpleri yumuşatır.'],
    verses:['Hûd 11/90','Bürûc 85/14'] },
  { id:'esma-49', type:'esma', title:'El-Mecîd', arabic:'المجيد', subtitle:'Şanı yüce ve cömert.', meaning:'Şanı yüce, hükümranlığı büyük, ikramı bol olan.', ebced:57, tag:'Şeref',
    virtues:['Salavatta geçen “inneke hamîdün mecîd” ifadesi bu ismi her gün diller taşır.','Zikri, ilâhî şerefin yansıması olarak kulun vakarını besler.'],
    verses:['Hûd 11/73','Bürûc 85/15'] },
  { id:'esma-50', type:'esma', title:'El-Bâis', arabic:'الباعث', subtitle:'Ölüleri dirilten, gönderen.', meaning:'Ölüleri diriltecek, peygamberler gönderen, gayret ve azim uyandıran.', ebced:573, tag:'Diriliş',
    virtues:['Bu isim, ölümün son değil bir geçiş olduğunu hatırlatır.','Zikri, gaflet uykusundan uyanma ve harekete geçme iradesini canlandırır.'],
    verses:['Hac 22/7 (fiil olarak)'] },
  { id:'esma-51', type:'esma', title:'Eş-Şehîd', arabic:'الشهيد', subtitle:'Her şeye şahit olan.', meaning:'Her an her yerde hazır olan, hiçbir şey kendisinden gizlenemeyen şahit.', ebced:319, tag:'Şahitlik',
    virtues:['Bu isim, hakikatin eninde sonunda ortaya çıkacağının güvencesidir.','Zikri, doğruluktan ayrılmama ve şahitliği dürüst yapma bilincini verir.'],
    verses:['Nisâ 4/79','Hac 22/17'] },
  { id:'esma-52', type:'esma', title:'El-Hakk', arabic:'الحق', subtitle:'Varlığı gerçek olan.', meaning:'Varlığı, vaadi ve hükmü gerçek olan; hakikatin kaynağı.', ebced:108, tag:'Hakikat',
    virtues:['Bu isim, bütün geçici gerçeklerin ötesindeki mutlak hakikati işaret eder.','Zikri, hakikat arayışını ve hakka bağlılığı derinleştirir.'],
    verses:['Hac 22/6','Nûr 24/25'] },
  { id:'esma-53', type:'esma', title:'El-Vekîl', arabic:'الوكيل', subtitle:'Güvenilip dayanılan.', meaning:'Kendisine güvenenlerin işini en güzel şekilde üstlenen.', ebced:66, tag:'Tevekkül',
    virtues:['Tevekkül ahlâkının dayandığı isimdir; tedbir kuldan, sonuç Allah’tandır.','Zikri, kaygıyı teslimiyete, telaşı sükûnete çevirir.'],
    verses:['Âl-i İmrân 3/173','Nisâ 4/81'] },
  { id:'esma-54', type:'esma', title:'El-Kaviyy', arabic:'القوي', subtitle:'Sonsuz güç sahibi.', meaning:'Gücü hiçbir şart altında azalmayan, her şeye yeten.', ebced:116, tag:'Güç',
    virtues:['Bu isim, insanın gücünün sınırlılığını ve gerçek güç kaynağını öğretir.','Zikri, acziyet anlarında “gücüm yetmiyor ama Kaviyy olan var” tesellisi verir.'],
    verses:['Hac 22/40','Hûd 11/66'] },
  { id:'esma-55', type:'esma', title:'El-Metîn', arabic:'المتين', subtitle:'Sarsılmaz kudret sahibi.', meaning:'Kudreti sağlam, sarsılmaz ve zaafa uğramaz olan.', ebced:500, tag:'Güç',
    virtues:['Kaviyy gücün varlığını, Metîn ise o gücün sarsılmazlığını ifade eder.','Zikri, iman sağlamlığı ve karakter metaneti için ilham kaynağıdır.'],
    verses:['Zâriyât 51/58'] },
  { id:'esma-56', type:'esma', title:'El-Veliyy', arabic:'الولي', subtitle:'Dost ve yardımcı.', meaning:'İman edenlerin dostu, koruyucusu ve yardımcısı olan.', ebced:46, tag:'Dostluk',
    virtues:['“Allah iman edenlerin velisidir” (Bakara 2/257) müjdesinin ismidir.','Zikri, yalnızlık duygusuna karşı en derin dostluğun kapısını açar.'],
    verses:['Şûrâ 42/28','Bakara 2/257'] },
  { id:'esma-57', type:'esma', title:'El-Hamîd', arabic:'الحميد', subtitle:'Her hamde lâyık olan.', meaning:'Bütün övgülerin gerçek sahibi ve muhatabı olan.', ebced:62, tag:'Hamd',
    virtues:['Elhamdülillah zikri, bu ismin günlük hayattaki en canlı karşılığıdır.','Zikri, övgüyü yaratılana değil Yaratan’a yöneltmeyi öğretir.'],
    verses:['İbrâhîm 14/1','Şûrâ 42/28'] },
  { id:'esma-58', type:'esma', title:'El-Muhsî', arabic:'المحصي', subtitle:'Her şeyi tek tek sayan.', meaning:'Her şeyin sayısını ve ölçüsünü bilen; hiçbir ayrıntıyı dışarıda bırakmayan.', ebced:148, tag:'İlim',
    virtues:['“Onların hepsini kuşatmış, tek tek saymıştır” (Meryem 19/94).','Zikri, amellerin en küçüğünün bile kayıtlı olduğu bilincini verir.'],
    verses:['Meryem 19/94 (fiil olarak)'] },
  { id:'esma-59', type:'esma', title:'El-Mübdi’', arabic:'المبدئ', subtitle:'İlk kez var eden.', meaning:'Varlığı örneksiz olarak ilk defa yaratan.', ebced:56, tag:'Yaratma',
    virtues:['“İlkin var eden O’dur, sonra iade edecek olan da O” (Bürûc 85/13).','Zikri, her başlangıcın ilâhî yaratmadan pay taşıdığını hatırlatır.'],
    verses:['Bürûc 85/13 (fiil olarak)'] },
  { id:'esma-60', type:'esma', title:'El-Muîd', arabic:'المعيد', subtitle:'Yeniden dirilten.', meaning:'Ölümden sonra varlığı yeniden yaratacak olan.', ebced:124, tag:'Diriliş',
    virtues:['Mübdi’ ile birlikte anılır; ilk yaratan, yeniden yaratmaya elbette kadirdir.','Zikri, âhiret inancını akla en yakın deliliyle tazeler.'],
    verses:['Bürûc 85/13 (fiil olarak)'] },
  { id:'esma-61', type:'esma', title:'El-Muhyî', arabic:'المحيي', subtitle:'Hayat veren.', meaning:'Cansıza can veren, ölü kalpleri ve ölü toprağı dirilten.', ebced:68, tag:'Hayat',
    virtues:['Baharda dirilen toprak, bu ismin gözle görülür tefsiridir (Rûm 30/50).','Zikri, umutsuz görünen durumların dirilebileceği ümidini taşır.'],
    verses:['Rûm 30/50','Fussilet 41/39'] },
  { id:'esma-62', type:'esma', title:'El-Mümît', arabic:'المميت', subtitle:'Ölümü yaratan.', meaning:'Ölümü yaratan ve her canlının ecelini takdir eden.', ebced:490, tag:'Takdir',
    virtues:['Ölüm de hayat gibi bir yaratmadır; başıboşluk değil takdirdir.','Zikri, ölümü hatırlamayı (rabıta-i mevt) sağlıklı bir bilinçle besler.'],
    verses:['Bakara 2/258 (fiil olarak)'] },
  { id:'esma-63', type:'esma', title:'El-Hayy', arabic:'الحي', subtitle:'Ezelî ve ebedî diri.', meaning:'Başlangıcı ve sonu olmayan gerçek hayat sahibi.', ebced:18, tag:'Hayat',
    virtues:['Âyetel Kürsî’nin açılış ismidir; bütün canlılık O’nun hayatından pay alır.','Zikri, fânilik duygusunu bâkî olana bağlanarak aşmayı öğretir.'],
    verses:['Bakara 2/255','Furkân 25/58'] },
  { id:'esma-64', type:'esma', title:'El-Kayyûm', arabic:'القيوم', subtitle:'Her şeyi ayakta tutan.', meaning:'Kendi zâtıyla var olan ve bütün varlığı her an ayakta tutan.', ebced:156, tag:'Kayyûmiyet',
    virtues:['Hayy ile birlikte ism-i a‘zam olduğu rivayet edilen isimlerdendir.','Zikri, varlığın her an ilâhî destekle durduğunu fark ettirir.'],
    verses:['Bakara 2/255','Âl-i İmrân 3/2'] },
  { id:'esma-65', type:'esma', title:'El-Vâcid', arabic:'الواجد', subtitle:'Dilediğini bulan.', meaning:'Hiçbir şeye muhtaç olmayan; dilediğini dilediği anda var eden ve bulan.', ebced:14, tag:'Gına',
    virtues:['Bu isim, Allah için “imkânsız” ve “eksik” kavramlarının geçersizliğini öğretir.','Zikri, kaybetme korkusunu ilâhî zenginliğe güvenle dengeler.'],
    verses:[] },
  { id:'esma-66', type:'esma', title:'El-Mâcid', arabic:'الماجد', subtitle:'Şan ve kerem sahibi.', meaning:'Şerefi yüce, cömertliği bol olan.', ebced:48, tag:'Şeref',
    virtues:['Mecîd ile aynı kökten gelir; ululuk ve cömertliğin birleşimini ifade eder.','Zikri, izzet ile ikramın birbirini tamamladığını hatırlatır.'],
    verses:[] },
  { id:'esma-67', type:'esma', title:'El-Vâhid', arabic:'الواحد', subtitle:'Bir ve tek olan.', meaning:'Zâtında, sıfatlarında ve fiillerinde eşi benzeri olmayan tek.', ebced:19, tag:'Tevhid',
    virtues:['Tevhidin ismidir; bütün ibadetlerin yöneldiği tek kapıyı gösterir.','Zikri, dağınık gönlü tek bir yöne toplayarak iç bütünlük kazandırır.'],
    verses:['Ra‘d 13/16','Zümer 39/4'] },
  { id:'esma-68', type:'esma', title:'Es-Samed', arabic:'الصمد', subtitle:'Her şey kendisine muhtaç.', meaning:'Hiçbir şeye muhtaç olmayan; her varlığın kendisine muhtaç olduğu.', ebced:134, tag:'Samediyet',
    virtues:['İhlâs Suresi’nin kalbindeki isimdir.','Zikri, ihtiyaçları önce kullara değil Rabbe arz etme edebini öğretir.'],
    verses:['İhlâs 112/2'] },
  { id:'esma-69', type:'esma', title:'El-Kâdir', arabic:'القادر', subtitle:'Her şeye gücü yeten.', meaning:'Dilediğini dilediği şekilde yapmaya kadir olan.', ebced:305, tag:'Kudret',
    virtues:['Bu isim, imkânsız görünenin ilâhî kudret için sıradan olduğunu öğretir.','Zikri, çaresizlik duygusunu kudret sahibine havale etmeyi sağlar.'],
    verses:['En‘âm 6/65','Kıyâme 75/40 (fiil olarak)'] },
  { id:'esma-70', type:'esma', title:'El-Muktedir', arabic:'المقتدر', subtitle:'Kudreti her şeye geçen.', meaning:'Kudretini dilediği anda ve dilediği ölçüde fiilen gösteren.', ebced:744, tag:'Kudret',
    virtues:['“Güçlü bir hükümdarın katında” (Kamer 54/55) ifadesiyle cennet meclisini tasvir eder.','Zikri, güce güvenenlerin değil Allah’a güvenenlerin kazanacağını hatırlatır.'],
    verses:['Kamer 54/55','Kamer 54/42'] },
  { id:'esma-71', type:'esma', title:'El-Mukaddim', arabic:'المقدم', subtitle:'Öne alan.', meaning:'Dilediğini öne alan, yaklaştıran ve öncelik veren.', ebced:184, tag:'Takdir',
    virtues:['Hz. Peygamber gece duasında “Öne alan sensin, geriye bırakan sensin” diye yakarırdı (Buhârî, Teheccüd 1).','Zikri, hayattaki öncelik sıralamasını ilâhî takdirle barışık kurmayı öğretir.'],
    verses:[] },
  { id:'esma-72', type:'esma', title:'El-Muahhir', arabic:'المؤخر', subtitle:'Geriye bırakan.', meaning:'Dilediğini hikmetiyle erteleyip geriye bırakan.', ebced:846, tag:'Takdir',
    virtues:['Gecikmeler de ilâhî takdirin parçasıdır; her erteleme bir mahrumiyet değildir.','Zikri, “neden hâlâ olmadı?” sancısını hikmete güvenle yumuşatır.'],
    verses:[] },
  { id:'esma-73', type:'esma', title:'El-Evvel', arabic:'الأول', subtitle:'Başlangıcı olmayan ilk.', meaning:'Varlığından önce hiçbir şey olmayan ezelî ilk.', ebced:37, tag:'Ezeliyet',
    virtues:['Hadîd 57/3’te dört isim birlikte anılır: Evvel, Âhir, Zâhir, Bâtın.','Zikri, her şeyin O’ndan başlayıp O’na döndüğü şuurunu verir.'],
    verses:['Hadîd 57/3'] },
  { id:'esma-74', type:'esma', title:'El-Âhir', arabic:'الآخر', subtitle:'Sonu olmayan son.', meaning:'Her şey yok olduktan sonra bâkî kalacak olan.', ebced:801, tag:'Ebediyet',
    virtues:['Bu isim, bütün sonların ötesinde bir sonsuzluk olduğunu öğretir.','Zikri, kayıpların ve bitişlerin mutlak olmadığı tesellisini taşır.'],
    verses:['Hadîd 57/3'] },
  { id:'esma-75', type:'esma', title:'Ez-Zâhir', arabic:'الظاهر', subtitle:'Varlığı apaçık olan.', meaning:'Varlığı eserleriyle apaçık ortada olan.', ebced:1106, tag:'Zuhur',
    virtues:['Kâinattaki her düzen ve güzellik bu ismin bir görünüşüdür.','Zikri, tabiata bakışı ibadete dönüştürür.'],
    verses:['Hadîd 57/3'] },
  { id:'esma-76', type:'esma', title:'El-Bâtın', arabic:'الباطن', subtitle:'Zâtı idrakten gizli olan.', meaning:'Zâtının hakikati duyularla kavranamayan; her şeyin iç yüzünü bilen.', ebced:62, tag:'Butûn',
    virtues:['Zâhir ile birlikte okunur: apaçık ve aynı anda idrak ötesi.','Zikri, görünenin ardındaki manaya dikkat kesilmeyi öğretir.'],
    verses:['Hadîd 57/3'] },
  { id:'esma-77', type:'esma', title:'El-Vâlî', arabic:'الوالي', subtitle:'İşleri yöneten.', meaning:'Varlığın bütün işlerini yöneten ve idare eden.', ebced:47, tag:'Yönetim',
    virtues:['Bu isim, kâinatın kendi hâline bırakılmış olmadığını öğretir.','Zikri, yöneticilik ve sorumluluk makamlarında adalet bilincini besler.'],
    verses:['Ra‘d 13/11'] },
  { id:'esma-78', type:'esma', title:'El-Müteâlî', arabic:'المتعالي', subtitle:'Aşkın ve yüce.', meaning:'Yaratılmışların nitelemelerinden ve kavrayışından yüce olan.', ebced:551, tag:'Yücelik',
    virtues:['Bu isim, Allah hakkında konuşurken edep ve haddini bilmeyi öğretir.','Zikri, insanın Rabbi hakkındaki tasavvurunu sürekli yükseltmeye çağırır.'],
    verses:['Ra‘d 13/9'] },
  { id:'esma-79', type:'esma', title:'El-Berr', arabic:'البر', subtitle:'İyiliği bol olan.', meaning:'Kullarına karşı iyiliği, ihsanı ve şefkati bol olan.', ebced:202, tag:'İyilik',
    virtues:['“Şüphesiz biz önceden O’na yalvarıyorduk; O iyilik sahibidir, merhametlidir” (Tûr 52/28).','Zikri, iyiliğin kaynağına şükrü ve iyiliği yaymayı birlikte öğretir.'],
    verses:['Tûr 52/28'] },
  { id:'esma-80', type:'esma', title:'Et-Tevvâb', arabic:'التواب', subtitle:'Tövbeleri kabul eden.', meaning:'Kullarını tövbeye yönelten ve tövbelerini tekrar tekrar kabul eden.', ebced:409, tag:'Tevbe',
    virtues:['Hz. Âdem’in tövbesinin kabulü bu isimle anlatılır (Bakara 2/37).','Zikri, hatadan dönüş yolunun daima açık olduğunu müjdeler.'],
    verses:['Bakara 2/37','Nasr 110/3'] },
  { id:'esma-81', type:'esma', title:'El-Müntakim', arabic:'المنتقم', subtitle:'Zalimden hesap soran.', meaning:'Suçta ısrar eden zalimlere hak ettikleri karşılığı veren.', ebced:630, tag:'Adalet',
    virtues:['Bu isim, mazlumun hakkının zayi olmayacağının teminatıdır.','Zikri, intikamı şahsileştirmeden adaleti Allah’a bırakmayı öğretir.'],
    verses:['Secde 32/22 (fiil kalıbıyla)'] },
  { id:'esma-82', type:'esma', title:'El-Afüvv', arabic:'العفو', subtitle:'Günahları silen.', meaning:'Günahları yalnız örtmekle kalmayıp izini de silen, çok affeden.', ebced:156, tag:'Af',
    virtues:['Hz. Âişe’ye Kadir gecesi için öğretilen dua bu isimledir: “Allahümme inneke afüvvün...” (Tirmizî, Deavât 84).','Zikri, affetmeyi sevmeyi ve affedilmeyi ummayı birlikte öğretir.'],
    verses:['Nisâ 4/43','Hac 22/60'] },
  { id:'esma-83', type:'esma', title:'Er-Raûf', arabic:'الرءوف', subtitle:'Çok şefkatli.', meaning:'Kullarına karşı şefkati ve esirgemesi çok olan.', ebced:287, tag:'Şefkat',
    virtues:['Rahmetin en ince, en koruyucu tonu bu isimde dile gelir.','Zikri, sertliğin değil şefkatin kalpleri değiştirdiğini hatırlatır.'],
    verses:['Bakara 2/143','Tevbe 9/117'] },
  { id:'esma-84', type:'esma', title:'Mâlikü’l-Mülk', arabic:'مالك الملك', subtitle:'Mülkün ebedî sahibi.', meaning:'Mülkü dilediğine veren, dilediğinden alan; mülkün gerçek ve ebedî sahibi.', ebced:212, tag:'Hükümranlık',
    virtues:['Âl-i İmrân 26. ayet bu ismin tefsiri gibidir: mülk O’nun elindedir.','Zikri, sahip olunanların emanet olduğu bilincini derinleştirir.'],
    verses:['Âl-i İmrân 3/26'] },
  { id:'esma-85', type:'esma', title:'Zü’l-Celâli ve’l-İkrâm', arabic:'ذو الجلال والإكرام', subtitle:'Celâl ve ikram sahibi.', meaning:'Azamet ile cömertliği, heybet ile lütfu kendinde birleştiren.', ebced:1100, tag:'Celâl ve Cemâl',
    virtues:['Rahmân Suresi’nin sonunda “Rabbinin adı ne yücedir” hitabıyla taçlanan isimdir.','Hz. Peygamber “Yâ ze’l-celâli ve’l-ikrâm zikrine sarılın” buyurmuştur (Tirmizî, Deavât 91).'],
    verses:['Rahmân 55/27','Rahmân 55/78'] },
  { id:'esma-86', type:'esma', title:'El-Muksit', arabic:'المقسط', subtitle:'Adaletle hükmeden.', meaning:'Hükmünde ve taksiminde adaletli davranan; mazlumun hakkını alan.', ebced:209, tag:'Adalet',
    virtues:['Bu isim, ilâhî adaletin yalnız cezada değil paylaştırmada da geçerli olduğunu öğretir.','Zikri, ölçüde, tartıda ve ilişkilerde hakkaniyeti hatırlatır.'],
    verses:['Âl-i İmrân 3/18 (kıst kökünden)'] },
  { id:'esma-87', type:'esma', title:'El-Câmi’', arabic:'الجامع', subtitle:'Toplayıp bir araya getiren.', meaning:'Dağınık olanı toplayan; insanları hesap günü bir araya getirecek olan.', ebced:114, tag:'Cem',
    virtues:['“Rabbimiz, insanları geleceğinde şüphe olmayan günde toplayacak olan sensin” (Âl-i İmrân 3/9).','Zikri, dağılmış işlerin ve gönüllerin toparlanması ümidini taşır.'],
    verses:['Âl-i İmrân 3/9','Nisâ 4/140'] },
  { id:'esma-88', type:'esma', title:'El-Ganiyy', arabic:'الغني', subtitle:'Hiçbir şeye muhtaç olmayan.', meaning:'Zâtında ve sıfatlarında hiçbir şeye muhtaç olmayan mutlak zengin.', ebced:1060, tag:'Gına',
    virtues:['“Ey insanlar, siz Allah’a muhtaçsınız; Allah ise Ganî’dir” (Fâtır 35/15).','Zikri, gerçek zenginliğin gönül tokluğu olduğunu öğretir.'],
    verses:['Fâtır 35/15','İbrâhîm 14/8'] },
  { id:'esma-89', type:'esma', title:'El-Mugnî', arabic:'المغني', subtitle:'Zenginlik veren.', meaning:'Dilediğini maddeten ve mânen zengin kılan, ihtiyaçtan kurtaran.', ebced:1100, tag:'Gına',
    virtues:['Zenginliği veren de alan da O’dur; sebepler yalnız perdedir.','Zikri, geçim kaygısını çalışmayı bırakmadan tevekküle bağlamayı öğretir.'],
    verses:['Necm 53/48 (fiil olarak)','Tevbe 9/28 (fiil olarak)'] },
  { id:'esma-90', type:'esma', title:'El-Mâni’', arabic:'المانع', subtitle:'Dilediğini engelleyen.', meaning:'Hikmeti gereği bazı şeylerin gerçekleşmesine izin vermeyen; kullarını koruyan.', ebced:161, tag:'Koruma',
    virtues:['Her engellenen istek bir mahrumiyet değildir; kimi engel korumadır.','Zikri, “olmadı” denilen şeylerde saklı hayrı görmeye yardım eder.'],
    verses:[] },
  { id:'esma-91', type:'esma', title:'Ed-Dârr', arabic:'الضار', subtitle:'Zararı yaratan.', meaning:'Hikmeti gereği zarar ve sıkıntıyı da yaratan; her şeyin dizgini elinde olan.', ebced:1001, tag:'Takdir',
    virtues:['Şer görüneni de yaratan Allah’tır; bu isim tevhidi yarım bırakmamayı öğretir.','Nâfi’ ile birlikte zikredilir; zarar ve fayda aynı kudretin elindedir.'],
    verses:[] },
  { id:'esma-92', type:'esma', title:'En-Nâfi’', arabic:'النافع', subtitle:'Faydayı yaratan.', meaning:'Her faydayı ve şifayı yaratan; hayrı dilediğine ulaştıran.', ebced:201, tag:'Lütuf',
    virtues:['İlaç, sebep ve çare ancak O dilerse fayda verir.','Zikri, sebeplere sarılırken şifayı ve faydayı Allah’tan bilmeyi öğretir.'],
    verses:[] },
  { id:'esma-93', type:'esma', title:'En-Nûr', arabic:'النور', subtitle:'Göklerin ve yerin nuru.', meaning:'Varlığı aydınlatan, kalplere iman ve hidayet ışığı veren.', ebced:256, tag:'Nur',
    virtues:['Nûr Suresi 35. ayet, bu ismin eşsiz temsille anlatıldığı yerdir.','Zikri, iç karanlık dönemlerinde aydınlığın kaynağına yönelmeyi öğretir.'],
    verses:['Nûr 24/35'] },
  { id:'esma-94', type:'esma', title:'El-Hâdî', arabic:'الهادي', subtitle:'Hidayet veren.', meaning:'Doğru yolu gösteren, dilediğini hakikate ulaştıran.', ebced:20, tag:'Hidayet',
    virtues:['Hidayet zorla değil lütufla gerçekleşir; kalpler O’nun elindedir.','Zikri, kendisi ve sevdikleri için hidayet istemeyi günlük vird hâline getirir.'],
    verses:['Hac 22/54','Furkân 25/31'] },
  { id:'esma-95', type:'esma', title:'El-Bedî’', arabic:'البديع', subtitle:'Örneksiz yaratan.', meaning:'Gökleri ve yeri benzersiz ve örneksiz yaratan.', ebced:86, tag:'Yaratma',
    virtues:['“Gökleri ve yeri örneksiz yaratandır” (Bakara 2/117).','Zikri, sanat ve güzellik karşısındaki hayranlığı asıl sahibine yöneltir.'],
    verses:['Bakara 2/117','En‘âm 6/101'] },
  { id:'esma-96', type:'esma', title:'El-Bâkî', arabic:'الباقي', subtitle:'Varlığı sonsuz olan.', meaning:'Fânilik kendisine erişemeyen, ebedî olan.', ebced:113, tag:'Beka',
    virtues:['“Rabbinin celâl ve ikram sahibi yüzü bâkî kalacaktır” (Rahmân 55/27).','Zikri, geçici olana bağlanmanın acısını bâkî olana bağlanarak dindirmeyi öğretir.'],
    verses:['Rahmân 55/27 (fiil olarak)','Tâhâ 20/73'] },
  { id:'esma-97', type:'esma', title:'El-Vâris', arabic:'الوارث', subtitle:'Her şeyin son sahibi.', meaning:'Bütün varlıklar yok olduktan sonra mülkün kendisine kalacağı gerçek vâris.', ebced:707, tag:'Beka',
    virtues:['“Şüphesiz biz diriltir ve öldürürüz; vâris olan da biziz” (Hicr 15/23).','Zikri, miras ve mülk kavgalarının geçiciliğini hatırlatır.'],
    verses:['Hicr 15/23','Meryem 19/40 (fiil kalıbıyla)'] },
  { id:'esma-98', type:'esma', title:'Er-Reşîd', arabic:'الرشيد', subtitle:'Doğru yola eriştiren.', meaning:'Bütün işleri isabetli olan; kullarını hikmetle doğruya yönelten.', ebced:514, tag:'İrşad',
    virtues:['Bu isim, ilâhî yönlendirmenin her işte en doğru sonuca götürdüğünü öğretir.','Zikri, kararsızlık anlarında istihare ve istişare edebini hatırlatır.'],
    verses:[] },
  { id:'esma-99', type:'esma', title:'Es-Sabûr', arabic:'الصبور', subtitle:'Cezada acele etmeyen.', meaning:'İsyana rağmen cezalandırmakta acele etmeyen; kullarına dönüş fırsatı tanıyan.', ebced:298, tag:'Sabır',
    virtues:['Listenin son ismi sabırdır; kulluk yolculuğunun da özeti budur.','Zikri, sabrı pasif bekleyiş değil, güvenle dayanma olarak öğretir.'],
    verses:[] },

  {
    id:'ayet-1', type:'ayet', title:'Âyetel Kürsî', tag:'Korunma ve Tevhid', target:1,
    arabic:'اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ',

  'Buhârî, Tevhîd 12; Müslim, Zikir 5-6 (doksan dokuz isim hadisi)',
  'Tirmizî, Deavât 82 (isimleri tek tek sayan rivayet)',

  'TDV İslâm Ansiklopedisi, “Esmâ-i Hüsnâ” maddesi'
];
const ESMA_NOTE = 'Ebced değerleri geleneksel hesaba göredir ve kaynaklarda küçük farklılıklar görülebilir; belirli sayıda zikre kesin bir dünyevî sonuç bağlamak dinî bir hüküm değildir.';
const ESMA_NO_VERSE = 'Bu isim Kur’an’da bu kalıpla geçmez; Tirmizî rivayetindeki esmâ-i hüsnâ listesinde yer alır.';

// --- DURUM ---
let favorites = JSON.parse(localStorage.getItem('virdiyarFavorites') || '[]');
let currentId = null;
let count = 0;
let stageIndex = 0;
let counterLang = 'tr'; // sayaç ekranında varsayılan dil: Türkçe okunuş

// --- YARDIMCILAR ---
const $ = id => document.getElementById(id);

function showToast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2400);
}

function vibrate(pattern){
  if(navigator.vibrate) navigator.vibrate(pattern);
}

function saveCounter(){
  localStorage.setItem('counter-'+currentId, JSON.stringify({count, stage: stageIndex}));
}

function loadCounter(id){
  const saved = JSON.parse(localStorage.getItem('counter-'+id) || '{"count":0,"stage":0}');
  count = saved.count || 0;
  stageIndex = saved.stage || 0;
}

// --- KART & LİSTELEME ---
function card(item, idx){
  const active = favorites.includes(item.id) ? 'active' : '';
  const showArabic = item.type === 'esma' && item.arabic; // ayet/dua kartlarında Arapça gösterilmez
  const num = item.type === 'esma' ? `<div class="num">${item.id.split('-')[1]} / 99</div>` : '';
  return `
    <article class="item">
      <div class="item-top">
        <div onclick="openItem('${item.id}')" style="flex:1;cursor:pointer">
          ${num}
          ${showArabic ? `<div class="arabic" lang="ar">${item.arabic}</div>` : ''}
          <h4>${item.title}</h4>
          <p>${item.subtitle}</p>
          <span class="tag">${item.tag}</span>
        </div>
        <button class="fav ${active}" onclick="toggleFavorite(event,'${item.id}')" aria-label="Favori">♥</button>
      </div>
    </article>`;
}

function render(){
  const esmas = data.filter(x=>x.type==='esma');
  $('esmaList').innerHTML = esmas.map(card).join('');
  $('esmaCount').textContent = `${esmas.length} isim`;
  $('ayetList').innerHTML = data.filter(x=>x.type==='ayet').map(card).join('');
  $('duaList').innerHTML = data.filter(x=>x.type==='dua').map(card).join('');
  const tesbihs = data.filter(x=>x.type==='tesbih');
  $('tesbihList').innerHTML = tesbihs.map(card).join('');
  $('tesbihCount').textContent = `${tesbihs.length} vird`;
  const favItems = data.filter(x=>favorites.includes(x.id));
  $('favCount').textContent = `${favItems.length} içerik`;
  $('favList').innerHTML = favItems.length ? favItems.map(card).join('') : '<div class="empty">Henüz favori eklemedin.</div>';
}

function toggleFavorite(e,id){
  e.stopPropagation();
  favorites = favorites.includes(id) ? favorites.filter(x=>x!==id) : [...favorites,id];
  localStorage.setItem('virdiyarFavorites',JSON.stringify(favorites));
  render();
}

// --- BUGÜNÜN ESMASI ---
function initHero(){
  const esmas = data.filter(x=>x.type==='esma');
  if(!esmas.length) return;
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((now - start) / 864e5);
  const esma = esmas[dayOfYear % esmas.length];
  $('heroTitle').textContent = esma.title;
  $('heroDesc').textContent = esma.subtitle;
  $('heroOpenBtn').onclick = ()=>openItem(esma.id);
  $('heroCountBtn').onclick = ()=>startCounter(esma.id);
}

// --- DETAY ---
function toggleArabic(btn){
  const block = btn.nextElementSibling;
  const isOpen = block.style.display !== 'none';
  block.style.display = isOpen ? 'none' : 'block';
  btn.textContent = isOpen ? 'Arapça metni göster' : 'Arapça metni gizle';
}

function openItem(id){
  const item = data.find(x=>x.id===id);
  if(!item) return;
  const isEsma = item.type === 'esma';

  // Arapça: esmada doğrudan, ayet/duada "göster" butonunun arkasında
  let arabicBlock = '';
  if(item.arabic){
    arabicBlock = isEsma
      ? `<div class="arabic-big" lang="ar">${item.arabic}</div>`
      : `<button class="secondary arabic-toggle" onclick="toggleArabic(this)">Arapça metni göster</button>
         <div class="arabic-big" lang="ar" style="display:none">${item.arabic}</div>`;
  }

  const virtues = item.virtues?.length
    ? `<h3>Fazilet ve Tefekkür</h3><ul class="virtues">${item.virtues.map(v=>`<li>${v}</li>`).join('')}</ul>`
    : '';

  let verses = '';
  if(isEsma){
    verses = item.verses?.length
      ? `<div class="meta"><strong>Kur’an’da Geçtiği Yerler</strong><p>${item.verses.join(' • ')}</p></div>`
      : `<div class="meta"><strong>Kaynak Notu</strong><p>${ESMA_NO_VERSE}</p></div>`;
  }

  const sourceItems = isEsma
    ? [ ...(item.verses?.length ? [`Kur’an-ı Kerim: ${item.verses.join('; ')}`] : []), ...ESMA_SOURCES ]
    : (item.sources || []);
  const sources = sourceItems.length
    ? `<h3>Kaynaklar</h3><div class="source-list">${sourceItems.map(s=>`<div class="source-item">${s}</div>`).join('')}</div>`
    : '';

  $('sheetContent').innerHTML = `
    <h2>${item.title}</h2>
    ${arabicBlock}
    ${item.reading ? `<div class="meta"><strong>Okunuşu</strong><p class="reading">${item.reading}</p></div>` : ''}
    <div class="meta"><strong>Anlamı ve Açıklaması</strong><p>${item.meaning}</p></div>
    ${item.ebced ? `<div class="meta"><strong>Ebced değeri</strong><p>${item.ebced}</p></div>` : ''}
    ${verses}
    ${virtues}
    ${sources}
    ${isEsma ? `<p class="disclaimer">${ESMA_NOTE}</p>` : ''}
    <button class="primary" style="width:100%;margin-top:16px" onclick="startCounter('${item.id}')">Sayaçla Başla</button>
  `;
  $('modal').classList.add('open');
}

// --- SAYAÇ ---
function startCounter(id){
  const item = data.find(x=>x.id===id);
  if(!item) return;
  currentId = id;
  counterLang = 'tr'; // her yeni zikre Türkçe okunuşla başla
  loadCounter(id);
  renderCounter(item);
  $('modal').classList.add('open');
}

function setCounterLang(lang){
  counterLang = lang;
  const item = data.find(x=>x.id===currentId);
  if(item) renderCounter(item);
}

function renderCounter(item){
  if(item.stages){
    const stage = item.stages[Math.min(stageIndex, item.stages.length-1)];
    const done = stageIndex >= item.stages.length;
    const dots = item.stages.map((s,i)=>{
      const cls = i < stageIndex ? 'done' : (i === stageIndex ? 'current' : '');
      return `<span class="stage-dot ${cls}" title="${s.label}"></span>`;
    }).join('');
    const langToggle = `
      <div class="lang-toggle">
        <button class="lang-btn ${counterLang==='tr'?'active':''}" onclick="setCounterLang('tr')">Türkçe</button>
        <button class="lang-btn ${counterLang==='ar'?'active':''}" onclick="setCounterLang('ar')">Arapça</button>
      </div>`;
    $('sheetContent').innerHTML = `
      <h2>${item.title}</h2>
      <div class="counter">
        <div class="stage-info">${dots}</div>
        ${done
          ? `<p class="stage-label">Tesbihat tamamlandı 🌙</p>`
          : `${langToggle}
             ${counterLang==='ar'
               ? `<div class="arabic-big" lang="ar" style="text-align:center;font-size:26px">${stage.arabic}</div>
                  <p class="stage-label">${stage.label} — Hedef: ${stage.target}</p>`
               : `<p class="stage-label" style="font-size:20px">${stage.label}</p>
                  <p class="stage-label" style="font-weight:400;color:var(--muted)">Hedef: ${stage.target}</p>`
             }`
        }
        <div class="count-number" id="countNumber">${done ? '✓' : count}</div>
        ${done
          ? `<button class="count-btn" onclick="resetCounter()">Yeniden</button>`
          : `<button class="count-btn" onclick="incrementCounter()">Zikret</button>`
        }
        <div class="counter-actions">
          <button onclick="resetCounter()">Sıfırla</button>
          ${done ? '' : `<button onclick="decrementCounter()">−1</button>`}
        </div>
      </div>
    `;
  } else {
    const target = item.ebced || item.target || 33;
    const tur = Math.floor(count / target);
    const trText = item.reading || item.title; // esmada 'reading' yok, başlık zaten Türkçe okunuş
    const hasArabic = !!item.arabic;
    $('sheetContent').innerHTML = `
      <h2>${item.title}</h2>
      <p style="color:var(--muted)">Hedef: ${target}</p>
      <div class="counter">
        ${hasArabic ? `
        <div class="lang-toggle">
          <button class="lang-btn ${counterLang==='tr'?'active':''}" onclick="setCounterLang('tr')">Türkçe</button>
          <button class="lang-btn ${counterLang==='ar'?'active':''}" onclick="setCounterLang('ar')">Arapça</button>
        </div>` : ''}
        ${hasArabic && counterLang==='ar'
          ? `<div class="arabic-big" lang="ar" style="text-align:center;font-size:22px;line-height:1.9">${item.arabic}</div>`
          : `<p class="reading" style="text-align:center">${trText}</p>`
        }
        <div class="count-number" id="countNumber">${target === 1 ? count : count % target}</div>
        <button class="count-btn" onclick="incrementCounter()">Zikret</button>
        <div class="tur-badge" id="turBadge">${tur > 0 ? `Tamamlanan tur: ${tur} • Toplam: ${count}` : ''}</div>
        <div class="counter-actions">
          <button onclick="resetCounter()">Sıfırla</button>
          <button onclick="decrementCounter()">−1</button>
        </div>
      </div>
    `;
  }
}

function incrementCounter(){
  const item = data.find(x=>x.id===currentId);
  if(!item) return;
  count++;
  vibrate(20);

  if(item.stages){
    const stage = item.stages[stageIndex];
    if(count >= stage.target){
      stageIndex++;
      count = 0;
      if(stageIndex >= item.stages.length){
        vibrate([60,60,120]);
        showToast('Tesbihat tamamlandı, kabul olsun 🤲');
      } else {
        vibrate([40,40,40]);
        showToast(`${stage.label} tamam — sırada ${item.stages[stageIndex].label}`);
      }
    }
    saveCounter();
    renderCounter(item);
  } else {
    const target = item.ebced || item.target || 33;
    if(count % target === 0){
      vibrate([60,60,120]);
      showToast(`Hedef tamamlandı — ${Math.floor(count/target)}. tur bitti`);
    }
    saveCounter();
    $('countNumber').textContent = target === 1 ? count : count % target;
    const tur = Math.floor(count / target);
    $('turBadge').textContent = tur > 0 ? `Tamamlanan tur: ${tur} • Toplam: ${count}` : '';
  }
}

function decrementCounter(){
  const item = data.find(x=>x.id===currentId);
  if(!item) return;
  count = Math.max(0, count-1);
  saveCounter();
  renderCounter(item);
}

function resetCounter(){
  const item = data.find(x=>x.id===currentId);
  if(!item) return;
  count = 0;
  stageIndex = 0;
  saveCounter();
  renderCounter(item);
}

function closeModal(e){
  if(e.target.id==='modal') $('modal').classList.remove('open');
}

// --- GÖRÜNÜM ---
function switchView(view){
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===view));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  window.scrollTo({top:0,behavior:'smooth'});
}
document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>switchView(btn.dataset.view)));

// --- ARAMA ---
// Türkçe küçük harfe çevirme (İ/I sorunu) + şapkalı harfleri sadeleştirerek
// aksansız yazılan sorguların da eşleşmesini sağlar (örn. "rahman" -> "rahmân").
function normalizeSearch(str){
  return str
    .toLocaleLowerCase('tr')
    .replace(/[âÂ]/g,'a')
    .replace(/[îÎ]/g,'i')
    .replace(/[ûÛ]/g,'u');
}
function runSearch(){
  const q = normalizeSearch($('globalSearch').value.trim());
  if(!q){
    render();
    switchView('home');
    return;
  }
  const matches = data.filter(x=>normalizeSearch(x.title+' '+x.subtitle+' '+x.meaning+' '+x.tag).includes(q));
  $('searchCount').textContent = `${matches.length} sonuç`;
  $('searchList').innerHTML = matches.length ? matches.map(card).join('') : '<div class="empty">Sonuç bulunamadı.</div>';
  switchView('search');
}
// Arama her tuş vuruşunda değil; Enter'a basılınca veya büyüteç ikonuna
// dokunulunca çalışır. Kutuyu boşaltmak anında ana sayfaya döner.
$('globalSearch').addEventListener('input',e=>{
  if(!e.target.value.trim()){
    render();
    switchView('home');
  }
});
$('globalSearch').addEventListener('keydown',e=>{
  if(e.key === 'Enter'){
    e.preventDefault();
    runSearch();
  }
});
$('searchIconBtn').addEventListener('click', runSearch);

// --- TEMA ---
function applyTheme(theme){
  document.body.dataset.theme = theme;
  $('themeBtn').textContent = theme === 'dark' ? '☀' : '☾';
  document.querySelector('meta[name="theme-color"]').setAttribute('content', theme === 'dark' ? '#1f1c18' : '#f7f2e8');
  localStorage.setItem('virdiyarTheme', theme);
}
$('themeBtn').addEventListener('click',()=>{
  applyTheme(document.body.dataset.theme === 'dark' ? 'light' : 'dark');
});
applyTheme(localStorage.getItem('virdiyarTheme') || 'light');

initHero();
render();
</script>
